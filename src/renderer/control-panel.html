<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DS Agent — Control Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ===== Theme 1: 暗夜紫 ===== */
    body[data-theme="mocha"] {
      --ds-bg-base: #1e1e2e; --ds-bg-mantle: #181825;
      --ds-bg-surface0: #313244; --ds-bg-surface1: #45475a;
      --ds-text-primary: #cdd6f4; --ds-text-secondary: #a6adc8;
      --ds-accent-blue: #89b4fa; --ds-accent-sky: #74c7ec;
      --ds-accent-green: #a6e3a1; --ds-accent-red: #f38ba8; --ds-accent-maroon: #eba0ac;
      --ds-text-on-accent: #1e1e2e;
    }
    /* ===== Theme 2: 拿铁白 ===== */
    body[data-theme="latte"] {
      --ds-bg-base: #eff1f5; --ds-bg-mantle: #e6e9ef;
      --ds-bg-surface0: #ccd0da; --ds-bg-surface1: #bcc0cc;
      --ds-text-primary: #4c4f69; --ds-text-secondary: #5c5f77;
      --ds-accent-blue: #1e66f5; --ds-accent-sky: #04a5e5;
      --ds-accent-green: #40a02b; --ds-accent-red: #d20f39; --ds-accent-maroon: #e64553;
      --ds-text-on-accent: #ffffff;
    }
    /* ===== Theme 3: 苹果亮色 ===== */
    body[data-theme="apple-light"] {
      --ds-bg-base: #f5f5f7; --ds-bg-mantle: #e8e8ed;
      --ds-bg-surface0: #e8e8ed; --ds-bg-surface1: #d2d2d7;
      --ds-text-primary: #1d1d1f; --ds-text-secondary: #6e6e73;
      --ds-accent-blue: #0071e3; --ds-accent-sky: #5ac8fa;
      --ds-accent-green: #34c759; --ds-accent-red: #ff3b30; --ds-accent-maroon: #ff2d55;
      --ds-text-on-accent: #ffffff;
    }
    /* ===== Theme 4: 苹果暗色 ===== */
    body[data-theme="apple-dark"] {
      --ds-bg-base: #1c1c1e; --ds-bg-mantle: #2c2c2e;
      --ds-bg-surface0: #2c2c2e; --ds-bg-surface1: #3a3a3c;
      --ds-text-primary: #f5f5f7; --ds-text-secondary: #aeaeb2;
      --ds-accent-blue: #0a84ff; --ds-accent-sky: #64d2ff;
      --ds-accent-green: #30d158; --ds-accent-red: #ff453a; --ds-accent-maroon: #ff375f;
      --ds-text-on-accent: #ffffff;
    }
    /* ===== Theme 5: 极简灰 ===== */
    body[data-theme="slate"] {
      --ds-bg-base: #1e1e24; --ds-bg-mantle: #18181d;
      --ds-bg-surface0: #2a2a32; --ds-bg-surface1: #3a3a44;
      --ds-text-primary: #e4e4ec; --ds-text-secondary: #a0a0b0;
      --ds-accent-blue: #7c8aff; --ds-accent-sky: #6cc8ff;
      --ds-accent-green: #6cd4a0; --ds-accent-red: #ff7080; --ds-accent-maroon: #ff90a0;
      --ds-text-on-accent: #ffffff;
    }
    /* ===== Theme 6: 深海蓝 ===== */
    body[data-theme="ocean"] {
      --ds-bg-base: #1a2332; --ds-bg-mantle: #151d2b;
      --ds-bg-surface0: #243447; --ds-bg-surface1: #2d4058;
      --ds-text-primary: #dce6f5; --ds-text-secondary: #8fa8c8;
      --ds-accent-blue: #5b9cf5; --ds-accent-sky: #4dc9f6;
      --ds-accent-green: #4dc9a0; --ds-accent-red: #f57080; --ds-accent-maroon: #f590a0;
      --ds-text-on-accent: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ds-bg-base); color: var(--ds-text-primary); font-size: 13px;
    }

    /* Tabs */
    .tabs {
      display: flex; border-bottom: 1px solid var(--ds-bg-surface0);
      background: var(--ds-bg-mantle);
    }
    .tab {
      padding: 10px 16px; cursor: pointer; color: var(--ds-text-secondary);
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab:hover { color: var(--ds-text-primary); }
    .tab.active { color: var(--ds-accent-blue); border-bottom-color: var(--ds-accent-blue); }

    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* Status */
    .status-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .status-card {
      background: var(--ds-bg-surface0); border-radius: 8px; padding: 12px;
    }
    .status-card .label { color: var(--ds-text-secondary); font-size: 11px; margin-bottom: 4px; }
    .status-card .value { font-size: 18px; font-weight: 600; }
    .status-card .value.ok { color: var(--ds-accent-green); }
    .status-card .value.err { color: var(--ds-accent-red); }

    /* Tool list */
    .tool-list { list-style: none; }
    .tool-item {
      background: var(--ds-bg-surface0); border-radius: 6px; padding: 10px 12px;
      margin-bottom: 6px; cursor: pointer; transition: background 0.2s;
    }
    .tool-item:hover { background: var(--ds-bg-surface1); }
    .tool-item .tool-name { font-weight: 600; color: var(--ds-accent-blue); }
    .tool-item .tool-desc { color: var(--ds-text-secondary); font-size: 12px; margin-top: 2px; }

    /* Settings */
    .setting-group { margin-bottom: 16px; }
    .setting-group label {
      display: block; color: var(--ds-text-secondary); font-size: 12px; margin-bottom: 4px;
    }
    .setting-group input, .setting-group select {
      width: 100%; padding: 8px 10px; background: var(--ds-bg-surface0); color: var(--ds-text-primary);
      border: 1px solid var(--ds-bg-surface1); border-radius: 6px; font-size: 13px;
    }
    .setting-group input:focus, .setting-group select:focus {
      outline: none; border-color: var(--ds-accent-blue);
    }

    .btn {
      padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .btn-primary { background: var(--ds-accent-blue); color: var(--ds-text-on-accent); }
    .btn-primary:hover { background: var(--ds-accent-sky); }
    .btn-danger { background: var(--ds-accent-red); color: var(--ds-text-on-accent); }
    .btn-danger:hover { background: var(--ds-accent-maroon); }

    /* Refresh button */
    .refresh-btn {
      float: right; background: none; border: none; color: var(--ds-accent-blue);
      cursor: pointer; font-size: 16px; padding: 4px;
    }
    .refresh-btn:hover { color: var(--ds-accent-sky); }

    /* Toggle switch */
    .toggle {
      position: relative; display: inline-block; width: 40px; height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0; background: var(--ds-bg-surface1); border-radius: 11px;
      transition: 0.3s; cursor: pointer;
    }
    .toggle .slider:before {
      content: ''; position: absolute; width: 18px; height: 18px;
      left: 2px; bottom: 2px; background: var(--ds-text-primary); border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .slider { background: var(--ds-accent-blue); }
    .toggle input:checked + .slider:before { transform: translateX(18px); }
  </style>
</head>
<body data-theme="mocha">
  <div class="tabs">
    <div class="tab active" data-tab="status">状态</div>
    <div class="tab" data-tab="tools">工具</div>
    <div class="tab" data-tab="settings">设置</div>
  </div>

  <!-- Status Tab -->
  <div class="tab-content active" id="tab-status">
    <div class="status-grid">
      <div class="status-card">
        <div class="label">工具状态</div>
        <div class="value" id="cp-conn">检测中</div>
      </div>
      <div class="status-card">
        <div class="label">工具数量</div>
        <div class="value" id="cp-tools">0</div>
      </div>
      <div class="status-card">
        <div class="label">Agent 状态</div>
        <div class="value" id="cp-agent">空闲</div>
      </div>
      <div class="status-card">
        <div class="label">当前站点</div>
        <div class="value" id="cp-site">-</div>
      </div>
    </div>
    <div class="status-card" style="margin-top: 10px;">
      <div class="label">工作目录</div>
      <div class="value" id="cp-workspace-status" style="font-size: 13px; word-break: break-all; color: var(--ds-accent-blue);">-</div>
    </div>
    <div style="margin-top: 16px; text-align: center;">
      <button class="btn btn-primary" id="cp-refresh">🔄 刷新状态</button>
    </div>
  </div>

  <!-- Tools Tab -->
  <div class="tab-content" id="tab-tools">
    <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
      <span>可用工具</span>
      <button class="refresh-btn" id="cp-refresh-tools" title="刷新">🔄</button>
    </div>
    <ul class="tool-list" id="cp-tool-list">
      <li style="color: var(--ds-text-secondary);">加载中...</li>
    </ul>
  </div>

  <!-- Settings Tab -->
  <div class="tab-content" id="tab-settings">
    <div class="setting-group">
      <label>工作目录</label>
      <div style="display: flex; gap: 6px;">
        <input type="text" id="cp-workspace" readonly style="flex: 1; cursor: default;" />
        <button class="btn btn-primary" id="cp-select-folder" style="white-space: nowrap;">📁 选择</button>
      </div>
      <div style="color: var(--ds-text-secondary); font-size: 11px; margin-top: 4px;">Agent 执行命令和文件操作的根目录</div>
    </div>
    <div class="setting-group">
      <label>聊天站点</label>
      <select id="cp-site-select">
        <option value="https://chat.deepseek.com">DeepSeek</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Agent 最大循环步数</label>
      <input type="number" id="cp-max-steps" value="100" min="1" max="500" />
    </div>
    <div class="setting-group" style="display: flex; justify-content: space-between; align-items: center;">
      <label style="margin-bottom: 0;">工具调用前确认</label>
      <label class="toggle">
        <input type="checkbox" id="cp-confirm-tools">
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-group">
      <label>主题配色</label>
      <select id="cp-theme-select">
        <option value="mocha">暗夜紫</option>
        <option value="latte">拿铁白</option>
        <option value="apple-light">苹果亮色</option>
        <option value="apple-dark">苹果暗色</option>
        <option value="slate">极简灰</option>
        <option value="ocean">深海蓝</option>
      </select>
    </div>
    <div style="margin-top: 20px; text-align: center;">
      <button class="btn btn-primary" id="cp-save-settings">💾 保存设置</button>
    </div>
  </div>

  <script>
    // Wait for dsAgent API to be available (contextBridge may not be ready immediately)
    function getDsAgent() {
      return window.dsAgent || null;
    }

    // Theme management
    var THEME_LIST = ['mocha','latte','apple-light','apple-dark','slate','ocean'];
    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      var sel = document.getElementById('cp-theme-select');
      if (sel) sel.value = theme;
    }

    function onThemeChange() {
      var theme = document.getElementById('cp-theme-select').value;
      applyTheme(theme);
      var dsAgent = getDsAgent();
      if (dsAgent) {
        dsAgent.setConfig('theme', theme).catch(function() {});
      }
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Refresh status
    async function refreshStatus() {
      const dsAgent = getDsAgent();
      if (!dsAgent) {
        document.getElementById('cp-conn').textContent = '❌ API 不可用';
        document.getElementById('cp-conn').className = 'value err';
        return;
      }

      try {
        const health = await dsAgent.health();
        document.getElementById('cp-conn').textContent = health.success ? '✅ 已就绪' : '❌ 未就绪';
        document.getElementById('cp-conn').className = 'value ' + (health.success ? 'ok' : 'err');
        document.getElementById('cp-tools').textContent = health.tools != null ? health.tools : 0;
      } catch (err) {
        console.error('[Control Panel] refreshStatus error:', err);
        document.getElementById('cp-conn').textContent = '❌ 未就绪';
        document.getElementById('cp-conn').className = 'value err';
      }

      try {
        const site = await dsAgent.detectSite();
        document.getElementById('cp-site').textContent = site === 'deepseek' ? 'DeepSeek' : site === 'chatgpt' ? 'ChatGPT' : site;
      } catch {
        document.getElementById('cp-site').textContent = '-';
      }

      try {
        const workspace = await dsAgent.getWorkspace();
        document.getElementById('cp-workspace-status').textContent = workspace || '-';
      } catch {
        document.getElementById('cp-workspace-status').textContent = '-';
      }
    }

    // Refresh tools
    async function refreshTools() {
      const dsAgent = getDsAgent();
      if (!dsAgent) {
        document.getElementById('cp-tool-list').innerHTML = '<li style="color: var(--ds-accent-red);">API 不可用</li>';
        return;
      }

      try {
        const result = await dsAgent.listTools();
        const list = document.getElementById('cp-tool-list');
        if (result.success && result.data && result.data.length > 0) {
          list.innerHTML = result.data.map(t =>
            '<li class="tool-item">' +
              '<div class="tool-name">' + escapeHtml(t.name) + '</div>' +
              '<div class="tool-desc">' + escapeHtml(t.description || '') + '</div>' +
            '</li>'
          ).join('');
        } else if (result.success && result.data && result.data.length === 0) {
          list.innerHTML = '<li style="color: var(--ds-text-secondary);">无可用工具</li>';
        } else {
          list.innerHTML = '<li style="color: var(--ds-accent-red);">加载失败: ' + escapeHtml(result.error || '未知错误') + '</li>';
        }
      } catch (err) {
        console.error('[Control Panel] refreshTools error:', err);
        document.getElementById('cp-tool-list').innerHTML = '<li style="color: var(--ds-accent-red);">加载失败: ' + escapeHtml(err.message || '') + '</li>';
      }
    }

    // Select folder button
    document.getElementById('cp-select-folder').addEventListener('click', async () => {
      const dsAgent = getDsAgent();
      if (!dsAgent) {
        alert('API 不可用');
        return;
      }
      try {
        const result = await dsAgent.selectFolder();
        if (result) {
          document.getElementById('cp-workspace').value = result;
          document.getElementById('cp-workspace-status').textContent = result;
        }
      } catch (err) {
        alert('选择目录失败: ' + (err.message || '未知错误'));
      }
    });

    // Save settings
    document.getElementById('cp-save-settings').addEventListener('click', async () => {
      const dsAgent = getDsAgent();
      if (!dsAgent) {
        alert('API 不可用，无法保存设置');
        return;
      }

      const siteSelect = document.getElementById('cp-site-select').value;
      const maxSteps = document.getElementById('cp-max-steps').value;
      const confirmTools = document.getElementById('cp-confirm-tools').checked;
      const theme = document.getElementById('cp-theme-select').value;

      try {
        await dsAgent.setConfig('max_steps', parseInt(maxSteps));
        await dsAgent.setConfig('confirm_tools', confirmTools);
        await dsAgent.setConfig('theme', theme);

        // Navigate to selected site
        await dsAgent.goto(siteSelect);

        alert('设置已保存');
      } catch (err) {
        console.error('[Control Panel] save settings error:', err);
        alert('保存设置失败: ' + (err.message || '未知错误'));
      }
    });

    // HTML escape helper
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners
    document.getElementById('cp-refresh').addEventListener('click', refreshStatus);
    document.getElementById('cp-refresh-tools').addEventListener('click', refreshTools);
    document.getElementById('cp-theme-select').addEventListener('change', onThemeChange);

    // Initial load — wait for dsAgent to be ready
    async function initPanel() {
      const dsAgent = getDsAgent();
      if (dsAgent) {
        try {
          // Load workspace
          const workspace = await dsAgent.getWorkspace();
          if (workspace) {
            document.getElementById('cp-workspace').value = workspace;
          }

          // Load saved settings
          const savedSteps = await dsAgent.getConfig('max_steps');
          if (savedSteps != null) {
            document.getElementById('cp-max-steps').value = savedSteps;
          }
          const savedConfirm = await dsAgent.getConfig('confirm_tools');
          if (savedConfirm != null) {
            document.getElementById('cp-confirm-tools').checked = savedConfirm;
          }

          // Load theme
          var savedTheme = await dsAgent.getConfig('theme');
          if (savedTheme === 'dark') savedTheme = 'mocha';
          if (savedTheme === 'light') savedTheme = 'latte';
          if (savedTheme && THEME_LIST.indexOf(savedTheme) !== -1) {
            applyTheme(savedTheme);
          } else {
            applyTheme('mocha');
          }
        } catch (err) {
          console.error('[Control Panel] load settings error:', err);
        }

        refreshStatus();
        refreshTools();
      } else {
        // Retry a few times — contextBridge should be very fast but just in case
        let retries = 0;
        const retryInterval = setInterval(() => {
          retries++;
          const agent = getDsAgent();
          if (agent) {
            clearInterval(retryInterval);
            // Load workspace and settings
            agent.getWorkspace().then(ws => {
              if (ws) {
                document.getElementById('cp-workspace').value = ws;
                document.getElementById('cp-workspace-status').textContent = ws;
              }
            }).catch(() => {});
            agent.getConfig('max_steps').then(v => {
              if (v != null) document.getElementById('cp-max-steps').value = v;
            }).catch(() => {});
            agent.getConfig('confirm_tools').then(v => {
              if (v != null) document.getElementById('cp-confirm-tools').checked = v;
            }).catch(() => {});
            agent.getConfig('theme').then(v => {
              if (v === 'dark') v = 'mocha';
              if (v === 'light') v = 'latte';
              if (v && THEME_LIST.indexOf(v) !== -1) applyTheme(v);
              else applyTheme('mocha');
            }).catch(() => {});
            refreshStatus();
            refreshTools();
          } else if (retries > 20) {
            clearInterval(retryInterval);
            document.getElementById('cp-conn').textContent = '❌ API 不可用';
            document.getElementById('cp-conn').className = 'value err';
            document.getElementById('cp-tool-list').innerHTML = '<li style="color: var(--ds-accent-red);">无法连接到主进程</li>';
          }
        }, 200);
      }
    }

    initPanel();
  </script>
</body>
</html>
