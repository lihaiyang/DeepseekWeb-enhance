<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DS Agent — Control Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e; color: #cdd6f4; font-size: 13px;
    }

    /* Tabs */
    .tabs {
      display: flex; border-bottom: 1px solid #313244;
      background: #181825;
    }
    .tab {
      padding: 10px 16px; cursor: pointer; color: #a6adc8;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab:hover { color: #cdd6f4; }
    .tab.active { color: #89b4fa; border-bottom-color: #89b4fa; }

    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* Status */
    .status-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .status-card {
      background: #313244; border-radius: 8px; padding: 12px;
    }
    .status-card .label { color: #a6adc8; font-size: 11px; margin-bottom: 4px; }
    .status-card .value { font-size: 18px; font-weight: 600; }
    .status-card .value.ok { color: #a6e3a1; }
    .status-card .value.err { color: #f38ba8; }

    /* Tool list */
    .tool-list { list-style: none; }
    .tool-item {
      background: #313244; border-radius: 6px; padding: 10px 12px;
      margin-bottom: 6px; cursor: pointer; transition: background 0.2s;
    }
    .tool-item:hover { background: #45475a; }
    .tool-item .tool-name { font-weight: 600; color: #89b4fa; }
    .tool-item .tool-desc { color: #a6adc8; font-size: 12px; margin-top: 2px; }

    /* Settings */
    .setting-group { margin-bottom: 16px; }
    .setting-group label {
      display: block; color: #a6adc8; font-size: 12px; margin-bottom: 4px;
    }
    .setting-group input, .setting-group select {
      width: 100%; padding: 8px 10px; background: #313244; color: #cdd6f4;
      border: 1px solid #45475a; border-radius: 6px; font-size: 13px;
    }
    .setting-group input:focus, .setting-group select:focus {
      outline: none; border-color: #89b4fa;
    }

    .btn {
      padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .btn-primary { background: #89b4fa; color: #1e1e2e; }
    .btn-primary:hover { background: #74c7ec; }
    .btn-danger { background: #f38ba8; color: #1e1e2e; }
    .btn-danger:hover { background: #eba0ac; }

    /* Refresh button */
    .refresh-btn {
      float: right; background: none; border: none; color: #89b4fa;
      cursor: pointer; font-size: 16px; padding: 4px;
    }
    .refresh-btn:hover { color: #74c7ec; }

    /* Toggle switch */
    .toggle {
      position: relative; display: inline-block; width: 40px; height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0; background: #45475a; border-radius: 11px;
      transition: 0.3s; cursor: pointer;
    }
    .toggle .slider:before {
      content: ''; position: absolute; width: 18px; height: 18px;
      left: 2px; bottom: 2px; background: #cdd6f4; border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .slider { background: #89b4fa; }
    .toggle input:checked + .slider:before { transform: translateX(18px); }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" data-tab="status">状态</div>
    <div class="tab" data-tab="tools">工具</div>
    <div class="tab" data-tab="settings">设置</div>
  </div>

  <!-- Status Tab -->
  <div class="tab-content active" id="tab-status">
    <div class="status-grid">
      <div class="status-card">
        <div class="label">工具状态</div>
        <div class="value" id="cp-conn">检测中</div>
      </div>
      <div class="status-card">
        <div class="label">工具数量</div>
        <div class="value" id="cp-tools">0</div>
      </div>
      <div class="status-card">
        <div class="label">Agent 状态</div>
        <div class="value" id="cp-agent">空闲</div>
      </div>
      <div class="status-card">
        <div class="label">当前站点</div>
        <div class="value" id="cp-site">-</div>
      </div>
    </div>
    <div style="margin-top: 16px; text-align: center;">
      <button class="btn btn-primary" id="cp-refresh">🔄 刷新状态</button>
    </div>
  </div>

  <!-- Tools Tab -->
  <div class="tab-content" id="tab-tools">
    <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
      <span>可用工具</span>
      <button class="refresh-btn" id="cp-refresh-tools" title="刷新">🔄</button>
    </div>
    <ul class="tool-list" id="cp-tool-list">
      <li style="color: #a6adc8;">加载中...</li>
    </ul>
  </div>

  <!-- Settings Tab -->
  <div class="tab-content" id="tab-settings">
    <div class="setting-group">
      <label>聊天站点</label>
      <select id="cp-site-select">
        <option value="https://chat.deepseek.com">DeepSeek</option>
        <option value="https://chatgpt.com">ChatGPT</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Agent 最大循环步数</label>
      <input type="number" id="cp-max-steps" value="10" min="1" max="50" />
    </div>
    <div class="setting-group" style="display: flex; justify-content: space-between; align-items: center;">
      <label style="margin-bottom: 0;">工具调用前确认</label>
      <label class="toggle">
        <input type="checkbox" id="cp-confirm-tools">
        <span class="slider"></span>
      </label>
    </div>
    <div style="margin-top: 20px; text-align: center;">
      <button class="btn btn-primary" id="cp-save-settings">💾 保存设置</button>
    </div>
  </div>

  <script>
    const dsAgent = window.dsAgent;

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Refresh status
    async function refreshStatus() {
      try {
        const health = await dsAgent.health();
        document.getElementById('cp-conn').textContent = health.success ? '✅ 已就绪' : '❌ 未就绪';
        document.getElementById('cp-conn').className = 'value ' + (health.success ? 'ok' : 'err');
        document.getElementById('cp-tools').textContent = health.tools || 0;
      } catch {
        document.getElementById('cp-conn').textContent = '❌ 未就绪';
        document.getElementById('cp-conn').className = 'value err';
      }

      try {
        const site = await dsAgent.detectSite();
        document.getElementById('cp-site').textContent = site === 'deepseek' ? 'DeepSeek' : site === 'chatgpt' ? 'ChatGPT' : site;
      } catch {
        document.getElementById('cp-site').textContent = '-';
      }
    }

    // Refresh tools
    async function refreshTools() {
      try {
        const result = await dsAgent.listTools();
        const list = document.getElementById('cp-tool-list');
        if (result.success && result.data) {
          list.innerHTML = result.data.map(t => `
            <li class="tool-item">
              <div class="tool-name">${t.name}</div>
              <div class="tool-desc">${t.description || ''}</div>
            </li>
          `).join('');
        } else {
          list.innerHTML = '<li style="color: #f38ba8;">加载失败</li>';
        }
      } catch {
        document.getElementById('cp-tool-list').innerHTML = '<li style="color: #f38ba8;">加载失败</li>';
      }
    }

    // Save settings
    document.getElementById('cp-save-settings').addEventListener('click', async () => {
      const siteSelect = document.getElementById('cp-site-select').value;
      const maxSteps = document.getElementById('cp-max-steps').value;
      const confirmTools = document.getElementById('cp-confirm-tools').checked;

      await dsAgent.setConfig('max_steps', parseInt(maxSteps));
      await dsAgent.setConfig('confirm_tools', confirmTools);

      // Navigate to selected site
      await dsAgent.goto(siteSelect);

      alert('设置已保存');
    });

    // Event listeners
    document.getElementById('cp-refresh').addEventListener('click', refreshStatus);
    document.getElementById('cp-refresh-tools').addEventListener('click', refreshTools);

    // Initial load
    refreshStatus();
    refreshTools();
  </script>
</body>
</html>
